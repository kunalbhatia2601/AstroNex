name: astronex
description: "AstroNex — A fully modular astrology application built with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  rxdart: ^0.28.0

  # Functional Programming
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/home/
    - assets/images/home/hero/
    - assets/images/onboarding/
    - assets/icons/
